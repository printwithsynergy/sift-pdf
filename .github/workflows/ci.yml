name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.20"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Install bandit + semgrep
        run: uv run pip install bandit semgrep==1.165.0

      - name: Bandit (medium severity / medium confidence)
        run: uv run bandit -r src/ -ll -ii

      - name: Semgrep (security-audit + secrets + python)
        run: uv run semgrep --config p/security-audit --config p/secrets --config p/python src/ --error

  lint-typecheck-test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.20"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Consume-surface audit
        run: uv run python scripts/consume_surface_audit.py

      - name: Pytest with coverage
        run: uv run pytest --cov=sift_pdf --cov-report=term-missing --cov-fail-under=70

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consume-surface-audit
          path: reports/audit/consume_surface.json
          if-no-files-found: ignore

  spectral:
    name: OpenAPI spectral lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI spec
        run: spectral lint docs/openapi.yaml --ruleset .spectral.yaml 2>/dev/null || spectral lint docs/openapi.yaml
